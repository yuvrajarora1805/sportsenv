version: '3.8'
services:
  app:
    build: .
    container_name: sports-inventory
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=sportsenv
      - DB_NAME=sports_inventory
    volumes:
      - ./public/uploads:/app/public/uploads
    depends_on:
      - db
      
  db:
    image: mariadb:10.11
    container_name: sports-inventory-db
    restart: unless-stopped
    environment:
      - MYSQL_ROOT_PASSWORD=sportsenv
      - MYSQL_DATABASE=sports_inventory
    volumes:
      - ./mysql_data:/var/lib/mysql
